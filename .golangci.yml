run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - bodyclose
    - nilerr
    - errorlint
    - misspell
    - unconvert
    - nakedret
    - wastedassign
    - usestdlibvars
    - prealloc
    - gofumpt
    - nolintlint
    - gocritic

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Sscanf # used in ID parse functions, safe to ignore
  gosec:
    excludes:
      - G107 # URL provided by user config, not hardcoded
      - G402 # InsecureSkipVerify is user-configurable via skip_ssl_verify
    severity: high
  staticcheck:
    checks:
      - "all"
  gocritic:
    disabled-checks:
      - ifElseChain # auth-selection if/else is clearer than a switch here; stylistic only

issues:
  exclude-dirs:
    - portainer_data
    - e2e-tests
    - examples
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
      text: "G101"
